name: PR 검증

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app:
    name: 앱 타입 및 Jest
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 앱 의존성 설치
        run: npm ci

      - name: TypeScript 검사
        run: npx tsc --noEmit

      - name: App Jest 실행
        run: npm test -- --runInBand --watchman=false

  server:
    name: 서버 테스트
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: 서버 의존성 설치
        run: npm ci

      - name: 서버 테스트 실행
        run: npm test
